<!doctype html>
<meta charset="utf-8" />
<title>Zetamac Google Sheet Sync Options</title>
<body style="font-family: system-ui; margin: 16px; max-width: 820px; line-height: 1.45;">
  <h2>Remote Export</h2>
  <p>Deploy the bundled Google Apps Script template for your spreadsheet, then paste its <code>/exec</code> URL here.</p>
  <div style="display: grid; gap: 12px; margin-bottom: 8px;">
    <label style="display: grid; gap: 6px;">
      <span>Webhook URL</span>
      <input id="webhookUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" style="padding: 8px; border: 1px solid #ccc; border-radius: 8px;" />
    </label>
    <label style="display: grid; gap: 6px;">
      <span>Shared Secret</span>
      <input id="secret" type="text" placeholder="Match the SHARED_SECRET script property" style="padding: 8px; border: 1px solid #ccc; border-radius: 8px;" />
    </label>
    <label style="display: grid; gap: 6px;">
      <span>Device Name</span>
      <input id="deviceName" type="text" placeholder="office-desktop" style="padding: 8px; border: 1px solid #ccc; border-radius: 8px;" />
    </label>
  </div>
  <div style="display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 8px;">
    <button id="saveRemote">Save Remote Settings</button>
    <button id="syncAll">Upload All Local Scores</button>
    <button id="retryPending">Retry Pending Uploads</button>
  </div>
  <p id="remoteStatus" style="margin: 6px 0 20px; color: #444;"></p>

  <h2>Import Scores (CSV)</h2>
  <p>CSV must have columns: <code>timestamp,iso,score</code>. You can export from the popup.</p>
  <input id="file" type="file" accept=".csv,text/csv" />
  <button id="import">Import</button>
  <script src="options.js"></script>
</body>
